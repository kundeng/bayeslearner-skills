name: splunk-itsi-administer
resources:
  # Phase 1: discover all pages from the left nav
  - name: discover
    entry:
      url: "https://help.splunk.com/en/splunk-it-service-intelligence/splunk-it-service-intelligence/administer/4.21/overview/about-administering-it-service-intelligence"
      root: toc
    globals:
      timeout_ms: 30000
      retries: 2
    nodes:
      - name: toc
        parents: []
        state:
          selector_exists: "a[href*='/administer/4.21/']"
        expand:
          over: elements
          scope: "a[href*='/administer/4.21/']"
          order: bfs                    # collect all URLs before descending
        extract:
          - link: { name: url, css: "a[href*='/administer/4.21/']" }
          - text: { name: title, css: "a[href*='/administer/4.21/']" }

  # Phase 2: extract content from each discovered page
  - name: extract_pages
    entry:
      url: { from: "toc.url" }
      root: page
    globals:
      timeout_ms: 30000
      page_load_delay_ms: 1500
    nodes:
      - name: page
        parents: []
        state:
          selector_exists: "article[role='article']"
        extract:
          - text: { name: title, css: "h1.title" }
          - html: { name: body, css: ".body" }

quality:
  min_records: 10
  max_empty_pct: 5
