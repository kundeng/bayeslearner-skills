# Pagination — expand over pages, children run once per page.
# Compose: put extraction nodes as children of "pages".
nodes:
  - name: pages
    parents: [root]
    expand:
      over: pages
      strategy: next
      control: ".next-page"
      limit: 10

  - name: items
    parents: [pages]
    expand:
      over: elements
      scope: ".item"
    extract:
      - text: { name: title, css: ".title" }
