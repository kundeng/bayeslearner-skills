# Sort + verify — click a column header, verify sort applied, then extract.
# The child's state check acts as transition verification.
nodes:
  - name: sort_by_rating
    parents: [root]
    state:
      selector_exists: "table"
    action:
      - click:
          css: "th.sortable[data-col='rating']"
        type: real
      - wait: { idle: true }

  - name: sorted_results
    parents: [sort_by_rating]
    state:
      # Transition verification: confirm sort actually applied
      selector_exists: "th.sortable[aria-sort='descending']"
    expand:
      over: elements
      scope: "table.results tbody tr"
    extract:
      - text: { name: name,   css: "td.name" }
      - text: { name: rating, css: "td.rating" }
