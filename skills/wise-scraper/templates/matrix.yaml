# Matrix — cartesian product of filter/search axes.
# Each combination produces a successor state; children run in each.
nodes:
  - name: search_combos
    parents: [root]
    expand:
      over: combinations
      axes:
        - action: type
          control: "#search-box"
          values: ["laptop", "tablet"]
        - action: select
          control: "#brand-dropdown"
          values: auto
        - action: checkbox
          control: "#in-stock"
          values: ["on"]
    action:
      - wait: { idle: true }

  - name: results
    parents: [search_combos]
    expand:
      over: elements
      scope: ".result-row"
    extract:
      - text: { name: title, css: ".title" }
      - text: { name: price, css: ".price" }
