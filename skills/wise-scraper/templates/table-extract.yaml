# Table extraction — header-based column mapping.
# Compose with pagination.yaml or matrix.yaml as needed.
nodes:
  - name: results_table
    parents: [root]
    state:
      table_headers: ["Name", "Score", "Rank"]
    extract:
      - table:
          name: results
          css: "table.results"
          header_row: 0
          columns:
            - name: name
              header: "Name"
            - name: score
              header: "Score"
            - name: rank
              header: "Rank"
