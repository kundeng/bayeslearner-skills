# Chaining — multi-resource pipeline: discover URLs → extract pages.
# BFS expansion collects all URLs first, then children visit each.
name: chained_scrape
resources:
  - name: categories
    entry: { url: "https://example.com/", root: root }
    nodes:
      - name: root
        parents: []

      - name: category_links
        parents: [root]
        expand:
          over: elements
          scope: "a.category-link"
          order: bfs
        extract:
          - link: { name: url, css: "a.category-link" }
          - text: { name: label, css: "a.category-link" }

  - name: products
    entry:
      url: { from: "category_links.url" }
      root: root
    nodes:
      - name: root
        parents: []
        action:
          - navigate: { to: "{url}" }
          - wait: { idle: true }

      - name: product_cards
        parents: [root]
        expand:
          over: elements
          scope: ".product-card"
        extract:
          - text: { name: name,  css: ".title" }
          - text: { name: price, css: ".price" }
