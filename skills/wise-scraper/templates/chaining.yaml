# Chaining — multi-resource pipeline with declared artifact schemas.
# Discovery produces typed URLs, extraction consumes them.
name: chained_scrape

artifacts:
  page_urls:
    fields:
      url:   { type: string, required: true }
      label: { type: string, required: true }
    description: "Discovered page URLs from navigation"

  page_content:
    fields:
      title: { type: string, required: true }
      body:  { type: string, required: true }
    consumes: page_urls
    description: "Extracted content from each page"

resources:
  - name: discover
    entry: { url: "https://example.com/", root: root }
    produces: page_urls
    nodes:
      - name: root
        parents: []

      - name: nav_links
        parents: [root]
        expand:
          over: elements
          scope: "nav a"
          order: bfs
        extract:
          - link: { name: url, css: "a" }
          - text: { name: label, css: "a" }

  - name: extract_pages
    entry:
      url: "{url}"
      root: page
    consumes: page_urls
    produces: page_content
    nodes:
      - name: page
        parents: []
        state:
          selector_exists: "article"
        extract:
          - text: { name: title, css: "h1" }
          - html: { name: body, css: "article" }
