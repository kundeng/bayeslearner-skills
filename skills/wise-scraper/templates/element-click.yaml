# Element click — click to reveal dynamic content, then extract.
# Models nested click patterns (e.g. color → HDD size → extract).
nodes:
  - name: color_variant
    parents: [root]
    expand:
      over: elements
      scope: "div.product-wrapper"
    action:
      - click:
          css: "select option:not(:has-text('Select'))"
        type: real
        uniqueness: css
        discard: when-control-exists
        delay_ms: 2000

  - name: hdd_variation
    parents: [color_variant]
    action:
      - click:
          css: "button:not([disabled])"
        type: real
        uniqueness: text
        delay_ms: 2000

  - name: product_data
    parents: [hdd_variation]
    extract:
      - text: { name: name,     css: "h4[itemprop='name']" }
      - text: { name: price,    css: "h4[itemprop='offers']" }
      - text: { name: hdd_size, css: "button.active" }
